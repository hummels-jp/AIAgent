<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapBox 路径规划</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>MapBox 路径规划</h1>
      <p class="desc">输入起点和终点，返回多条公交/地铁换乘路线，并在地图中可视化。</p>

      <form id="route-form" class="card">
        <div class="field">
          <label for="origin">起点</label>
          <input id="origin" name="origin" type="text" placeholder="例如：北京南站" required />
        </div>
        <div class="field">
          <label for="destination">终点</label>
          <input id="destination" name="destination" type="text" placeholder="例如：国家图书馆" required />
        </div>
        <button id="submit-btn" type="submit">查询换乘</button>
      </form>

      <section class="card">
        <h2>Agent 建议</h2>
        <pre id="agent-reply">等待查询...</pre>
      </section>

      <section class="card">
        <h2>路线地图</h2>
        <div class="map-locate-bar">
          <input id="map-locate-input" type="text" placeholder="输入地址后定位地图，例如：神田駅" />
          <button id="map-locate-btn" type="button">定位</button>
        </div>
        <div id="data-source" class="data-source">数据来源：等待查询</div>
        <div class="map-hint">鼠标点击地图点位后，可选择“设为起点”或“设为终点”。</div>
        <div id="map"></div>
      </section>

      <section class="card">
        <h2>备选路线</h2>
        <div id="route-list" class="route-list">暂无结果</div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      window.APP_CONFIG = {
        mapboxApiKey: "{{ mapbox_api_key or '' }}",
        mapillaryApiKey: "{{ mapillary_api_key or '' }}",
      };
    </script>
    <script src="/static/app.js"></script>
  </body>
</html>
