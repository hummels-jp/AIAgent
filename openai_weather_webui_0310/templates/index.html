<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini 天气 Agent</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Gemini 天气 Agent</h1>
      <p class="desc">输入城市名，Agent 会调用天气工具并返回当前天气。</p>

      <form id="weather-form" class="card">
        <label for="city">城市名</label>
        <input id="city" name="city" type="text" placeholder="例如：北京 / Shanghai / London" required />
        <button id="submit-btn" type="submit">查询天气</button>
      </form>

      <section class="card">
        <h2>天气卡片</h2>
        <div id="weather-card" class="weather-card hidden">
          <div><strong>城市：</strong><span id="w-city">-</span></div>
          <div><strong>天气：</strong><span id="w-text">-</span></div>
          <div><strong>温度：</strong><span id="w-temp">-</span></div>
          <div><strong>湿度：</strong><span id="w-humidity">-</span></div>
          <div><strong>风速：</strong><span id="w-wind">-</span></div>
          <div><strong>观测时间：</strong><span id="w-time">-</span></div>
        </div>

        <h2>Agent 总结</h2>
        <pre id="result">等待查询...</pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
